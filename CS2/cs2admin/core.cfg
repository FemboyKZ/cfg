// Core Configuration File for CS2 Admin (Metamod Plugin)
// Place this file at: <game_root>/cfg/cs2admin/core.cfg

"SourceBans"
{
    "Config"
    {
        "Website"               "https://sourcebans.femboy.kz"
        "ChatPrefix"            "{orchid}FKZ {grey}| "
        "CommandPrefix"         "!"
        "SilentCommandPrefix"   "/"
        "Addban"                "1"
        "Unban"                 "1"
        "DatabasePrefix"        "sb"
        "RetryTime"             "45.0"
        "ProcessQueueTime"      "5"
        "AutoAddServer"         "0"
        "BackupConfigs"         "1"
        "EnableAdmins"          "1"
        "RequireSiteLogin"      "0"
        "ServerID"              "10"
    }

    // Database connection settings (replaces SourceMod's databases.cfg)
    "Database"
    {
        "type"      "mysql"
        "host"      "127.0.0.1"
        "user"      ""
        "pass"      ""
        "database"  ""
        "port"      "3306"
        "path"      "addons/cs2admin/data/cs2admin.db"
    }

    // SourceComms configuration
    "CommsConfig"
    {
        "DefaultTime"                   "30"
        "DisableUnblockImmunityCheck"   "0"
        "ConsoleImmunity"               "20"
        "MaxLength"                     "0"
    }

    // Checker: notify admins of player history on connect
    "CheckerConfig"
    {
        // Print ban/comm history to admins when a player connects
        "PrintCheckOnConnect"           "1"
    }

    // Player report system
    "ReportConfig"
    {
        // Cooldown between reports per player (seconds)
        "Cooldown"                      "60.0"
        // Minimum character length for report reason
        "MinLength"                     "10"
    }

    // IP Sleuth: detect ban evasion via IP matching
    "SleuthConfig"
    {
        // Action when evasion detected:
        // 0 = disabled, 1 = ban (copy original), 2 = ban (custom duration),
        // 3 = ban (both original + custom), 4 = notify admins only, 5 = kick
        "Actions"                       "0"
        // Ban duration in minutes for action 2 (0 = permanent)
        "Duration"                      "0"
        // Number of IP-matched bans required before acting
        "BansAllowed"                   "0"
        // 0 = match all bans, 1 = only permanent bans
        "BanType"                       "0"
        // Players with ADMFLAG_BAN are exempt from sleuth checks
        "AdminBypass"                   "0"
        // Exclude old bans from matching
        "ExcludeOld"                    "0"
        // Max age of bans to consider in seconds (default: 1 year)
        "ExcludeTime"                   "31536000"
    }

    // Discord webhook integration
    "DiscordConfig"
    {
        // Discord webhook URL for admin action notifications
        // Leave empty to disable. Must be a valid Discord webhook URL.
        "WebhookUrl"                    ""
        // Text shown in the footer of Discord embeds
        "FooterText"                    "FKZ"
    }

    // Anti chat flood
    "ChatFloodConfig"
    {
        // Minimum seconds between chat messages (0 = disabled)
        "Cooldown"                      "0.75"
        // Number of rapid messages before action is taken
        "MaxMessages"                   "5"
        // Minutes to auto gag flooding players (0 = block message only, no gag)
        "MuteDuration"                  "0"
    }
}
